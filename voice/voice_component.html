<!DOCTYPE html>
<style>
  #voice-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
  }
  #call-btn {
    background: #2e7d32;
    color: white;
    border: none;
    border-radius: 50%;
    width: 42px;
    height: 42px;
    font-size: 20px;
    cursor: pointer;
  }
  #call-btn.active { background: #c62828; }
  #call-status { font-size: 13px; color: #555; }
  #transcript-box {
    font-size: 13px;
    color: #333;
    max-height: 80px;
    overflow-y: auto;
    background: #f5f5f5;
    padding: 6px 10px;
    border-radius: 6px;
    display: none;
    width: 100%;
  }
</style>

<div id="voice-bar">
  <button id="call-btn" title="Start voice call">📞</button>
  <span id="call-status">Click to start voice call</span>
</div>
<div id="transcript-box"></div>

<script>
  const THREAD_ID = "{{THREAD_ID}}";           // placeholder replaced at runtime in app.py
  const WS_URL    = "{{WS_URL}}/voice/" + THREAD_ID;

  let ws, audioCtx, mediaStream, processor, source;
  let isActive  = false;
  let audioQueue = [];
  let isPlaying  = false;

  const btn        = document.getElementById("call-btn");
  const status     = document.getElementById("call-status");
  const transcript = document.getElementById("transcript-box");

  btn.addEventListener("click", () => isActive ? stopCall() : startCall());

  async function startCall() {
    audioCtx    = new AudioContext({ sampleRate: 24000 });
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    ws          = new WebSocket(WS_URL);

    ws.onopen = () => {
      isActive = true;
      btn.classList.add("active");
      btn.textContent = "📵";
      status.textContent = "Call connected — speak now";
      transcript.style.display = "block";
      startMic();
    };

    ws.onmessage = async (event) => {
      const msg = JSON.parse(event.data);

      if (msg.type === "audio") {
        // Decode base64 PCM16 and queue for playback
        const raw   = atob(msg.audio);
        const bytes = new Uint8Array(raw.length);
        for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
        const pcm   = new Int16Array(bytes.buffer);
        const float = new Float32Array(pcm.length);
        for (let i = 0; i < pcm.length; i++) float[i] = pcm[i] / 32768;
        audioQueue.push(float);
        if (!isPlaying) playNext();
      }

      if (msg.type === "transcript") {
        transcript.textContent += msg.text;
        transcript.scrollTop = transcript.scrollHeight;
      }

      if (msg.type === "response_done") {
        transcript.textContent += "\n";
      }
    };

    ws.onclose = () => stopCall();
  }

  function startMic() {
    source    = audioCtx.createMediaStreamSource(mediaStream);
    processor = audioCtx.createScriptProcessor(4096, 1, 1);

    processor.onaudioprocess = (e) => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      const float = e.inputBuffer.getChannelData(0);
      const pcm   = new Int16Array(float.length);
      for (let i = 0; i < float.length; i++)
        pcm[i] = Math.max(-32768, Math.min(32767, float[i] * 32768));
      ws.send(pcm.buffer);   // send raw PCM16 bytes to FastAPI
    };

    source.connect(processor);
    processor.connect(audioCtx.destination);
  }

  function playNext() {
    if (audioQueue.length === 0) { isPlaying = false; return; }
    isPlaying    = true;
    const float  = audioQueue.shift();
    const buffer = audioCtx.createBuffer(1, float.length, 24000);
    buffer.copyToChannel(float, 0);
    const src    = audioCtx.createBufferSource();
    src.buffer   = buffer;
    src.connect(audioCtx.destination);
    src.onended  = playNext;
    src.start();
  }

  function stopCall() {
    isActive = false;
    btn.classList.remove("active");
    btn.textContent = "📞";
    status.textContent = "Call ended";
    if (processor)   { processor.disconnect(); processor = null; }
    if (source)      { source.disconnect();    source    = null; }
    if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
    if (ws && ws.readyState === WebSocket.OPEN) ws.close();
    if (audioCtx)    { audioCtx.close(); audioCtx = null; }
  }
</script>
